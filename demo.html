<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Knowdly — Demo Access</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#080810;--surface:#0f0f1c;--sur2:#161628;
      --border:rgba(255,255,255,0.09);
      --ac:#8b7bff;--ac2:#f7c26a;
      --tx:#ffffff;--tx2:#d4d0f0;--tx3:#a09ccc;
      --green:#4ade80;--red:#ff6b6b;
      --glow:rgba(139,123,255,0.25);
    }
    html,body{height:100%}
    body{
      font-family:'Plus Jakarta Sans',sans-serif;
      background:var(--bg);
      color:var(--tx);
      display:flex;align-items:center;justify-content:center;
      min-height:100vh;
      overflow:hidden;
    }

    /* Background orbs */
    body::before{
      content:'';position:fixed;
      width:700px;height:700px;border-radius:50%;
      background:radial-gradient(circle,rgba(139,123,255,0.12) 0%,transparent 70%);
      top:-200px;left:-200px;pointer-events:none;
    }
    body::after{
      content:'';position:fixed;
      width:500px;height:500px;border-radius:50%;
      background:radial-gradient(circle,rgba(247,194,106,0.07) 0%,transparent 70%);
      bottom:-100px;right:-100px;pointer-events:none;
    }

    .card{
      position:relative;z-index:1;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:24px;
      padding:3rem 3rem 2.5rem;
      width:100%;max-width:420px;
      margin:1.5rem;
      animation:fadeUp .5s ease both;
      box-shadow:0 0 80px rgba(139,123,255,0.08);
    }

    /* top accent line */
    .card::before{
      content:'';position:absolute;
      top:0;left:10%;right:10%;height:1px;
      background:linear-gradient(90deg,transparent,var(--ac),transparent);
      border-radius:1px;
    }

    .logo{
      display:block;text-align:center;
      font-size:2rem;font-weight:800;
      letter-spacing:-.03em;
      text-decoration:none;color:var(--tx);
      margin-bottom:2rem;
    }
    .logo span{
      background:linear-gradient(135deg,var(--ac),var(--ac2));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }

    .card-label{
      font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;
      color:var(--ac);font-weight:600;text-align:center;
      margin-bottom:.7rem;
    }

    h1{
      font-size:1.4rem;font-weight:800;letter-spacing:-.03em;
      text-align:center;margin-bottom:.5rem;
    }
    .sub{
      font-size:.88rem;color:var(--tx3);text-align:center;
      line-height:1.6;margin-bottom:2rem;font-weight:400;
    }

    .field{
      position:relative;margin-bottom:1rem;
    }
    .field input{
      width:100%;
      background:var(--sur2);
      border:1px solid var(--border);
      color:var(--tx);
      padding:.9rem 3rem .9rem 1.25rem;
      font-family:'Plus Jakarta Sans',sans-serif;
      font-size:.95rem;font-weight:400;
      border-radius:12px;outline:none;
      transition:border-color .2s,box-shadow .2s;
      letter-spacing:.08em;
    }
    .field input::placeholder{color:var(--tx3);letter-spacing:0}
    .field input:focus{
      border-color:var(--ac);
      box-shadow:0 0 0 3px rgba(139,123,255,0.12);
    }
    .field input.error{border-color:var(--red)}
    .field input.success{border-color:var(--green)}

    .toggle-pw{
      position:absolute;right:.9rem;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;
      color:var(--tx3);padding:.2rem;
      transition:color .2s;
      display:flex;align-items:center;
    }
    .toggle-pw:hover{color:var(--tx2)}

    .feedback{
      font-size:.82rem;font-weight:500;
      min-height:1.2rem;margin-bottom:1rem;
      text-align:center;
    }
    .feedback.err{color:var(--red)}
    .feedback.ok{color:var(--green)}

    .btn{
      width:100%;
      background:var(--ac);color:#fff;
      border:none;border-radius:12px;
      padding:.95rem;
      font-family:'Plus Jakarta Sans',sans-serif;
      font-size:.95rem;font-weight:700;
      cursor:pointer;
      box-shadow:0 0 28px rgba(139,123,255,0.35);
      transition:opacity .2s,transform .15s,box-shadow .2s;
      letter-spacing:.01em;
    }
    .btn:hover{opacity:.88;transform:translateY(-1px);box-shadow:0 0 38px rgba(139,123,255,0.5)}
    .btn:active{transform:translateY(0)}
    .btn:disabled{opacity:.5;cursor:default;transform:none}

    .shake{animation:shake .35s ease}

    .back{
      display:block;text-align:center;margin-top:1.5rem;
      font-size:.8rem;color:var(--tx3);text-decoration:none;
      transition:color .2s;
    }
    .back:hover{color:var(--tx2)}

    @keyframes fadeUp{
      from{opacity:0;transform:translateY(18px)}
      to{opacity:1;transform:translateY(0)}
    }
    @keyframes shake{
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-7px)}
      40%{transform:translateX(7px)}
      60%{transform:translateX(-5px)}
      80%{transform:translateX(5px)}
    }
  </style>
</head>
<body>

<div class="card">
  <a href="/" class="logo">Know<span>dly</span></a>

  <div class="card-label">Demo access</div>
  <h1>Enter your password</h1>
  <p class="sub">This demo is invite-only during beta.<br/>Enter your access password to continue.</p>

  <div class="field">
    <input type="password" id="pw" placeholder="Access password" autocomplete="off" spellcheck="false"/>
    <button class="toggle-pw" type="button" onclick="togglePw()" aria-label="Show/hide password" id="eyeBtn">
      <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
  </div>

  <div class="feedback" id="feedback"></div>

  <button class="btn" id="btn" onclick="check()">Access demo →</button>

  <a href="/" class="back">← Back to knowdly.com</a>
</div>

<script>
  // SHA-256 hash of the password — raw password is never stored here
  const HASH = '7a47b8a3baf9d324b0423f01d81a3a34dbb4bb6425dc6a89b806f7a10ac7c3bb';
  const DEST  = 'https://knowdly.com/app';   // ← redirect destination after correct password

  const pwInput  = document.getElementById('pw');
  const feedback = document.getElementById('feedback');
  const btn      = document.getElementById('btn');

  pwInput.addEventListener('keydown', e => { if(e.key === 'Enter') check(); });
  pwInput.addEventListener('input',   () => {
    pwInput.classList.remove('error','success');
    feedback.textContent = '';
    feedback.className = 'feedback';
  });

  async function sha256(str) {
    const buf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function check() {
    const val = pwInput.value.trim();
    if (!val) {
      shake(); feedback.className = 'feedback err';
      feedback.textContent = 'Please enter a password.'; return;
    }
    btn.disabled = true;
    btn.textContent = 'Checking…';
    const hash = await sha256(val);
    if (hash === HASH) {
      pwInput.classList.add('success');
      feedback.className = 'feedback ok';
      feedback.textContent = '✓ Access granted — redirecting…';
      btn.textContent = '✓';
      setTimeout(() => { window.location.href = DEST; }, 900);
    } else {
      pwInput.classList.add('error');
      feedback.className = 'feedback err';
      feedback.textContent = 'Incorrect password. Try again.';
      btn.disabled = false;
      btn.textContent = 'Access demo →';
      shake();
    }
  }

  function shake() {
    const card = document.querySelector('.card');
    card.classList.remove('shake');
    void card.offsetWidth;
    card.classList.add('shake');
  }

  function togglePw() {
    const isText = pwInput.type === 'text';
    pwInput.type = isText ? 'password' : 'text';
    document.getElementById('eyeIcon').innerHTML = isText
      ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
      : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  }
</script>
</body>
</html>
